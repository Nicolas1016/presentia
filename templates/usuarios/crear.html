<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Usuario - Presentia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0a1f44, #1f4e79);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-box {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #0a1f44;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
<div class="card-box">
    <h2>Crear Usuario</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" name="correo" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Rol</label>
            <select name="id_rol" class="form-control">
                <option value="1">Admin</option>
                <option value="2">Empleado</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success w-100">Crear Usuario</button>
    </form>

    <a href="{{ url_for('listar_usuarios') }}" class="d-block text-center mt-3 text-decoration-none">
        Volver al listado
    </a>
</div>
</body>
</html>
