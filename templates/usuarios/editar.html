<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario - Presentia</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0a1f44, #1f4e79);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #0a1f44;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Editar Usuario</h2>

    <!-- Formulario de edición -->
    <form action="{{ url_for('editar_usuario', id=user[0]) }}" method="POST">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" name="nombre" value="{{ user[1] }}" required>
        </div>
        <div class="mb-3">
            <label for="correo" class="form-label">Correo</label>
            <input type="email" class="form-control" id="correo" name="correo" value="{{ user[2] }}" required>
        </div>
        <div class="mb-3">
            <label for="id_rol" class="form-label">Rol</label>
            <input type="number" class="form-control" id="id_rol" name="id_rol" value="{{ user[4] }}" required>
        </div>
        <button type="submit" class="btn btn-warning w-100">Actualizar</button>
    </form>

    <!-- Enlace para volver al listado -->
    <a href="{{ url_for('usuarios') }}" class="d-block text-center mt-3 text-decoration-none text-primary">
        Volver al listado
    </a>
</div>
</body>
</html>
