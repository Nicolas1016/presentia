<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Presentia</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0a1f44, #1f4e79);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #0a1f44;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>Presentia</h2>

    <!-- Formulario de login -->
<form action="{{ url_for('login') }}" method="POST">
    <div class="mb-3">
        <input type="text" class="form-control" name="correo" placeholder="Correo" required>
    </div>
    <div class="mb-3">
        <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
</form>

    <!-- Enlace a crear usuario -->
    <a href="{{ url_for('crear_usuario') }}" class="d-block text-center mt-3 text-decoration-none text-primary">
        Crear usuario
    </a>
</div>
</body>
</html>
